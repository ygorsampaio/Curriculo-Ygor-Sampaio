<!DOCTYPE html>
<html lang="pt-br" data-lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ygor Sampaio — Portfólio</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05060c;
      --surface: #0c0e18;
      --blue: #4f8ef7;
      --blue-dim: rgba(79,142,247,0.10);
      --blue-border: rgba(79,142,247,0.25);
      --text: #eaecf4;
      --muted: #5a6278;
      --muted2: #8892a8;
      --border: rgba(255,255,255,0.06);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Noise overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* ── Orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 700px; height: 700px; background: #1d4ed8; opacity: 0.13; top: -280px; right: -200px; animation: drift1 14s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: #0369a1; opacity: 0.10; bottom: -150px; left: -150px; animation: drift2 18s ease-in-out infinite alternate; }
    .orb-3 { width: 300px; height: 300px; background: #4f46e5; opacity: 0.07; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift3 10s ease-in-out infinite alternate; }

    @keyframes drift1 { to { transform: translate(50px, 80px) scale(1.1); } }
    @keyframes drift2 { to { transform: translate(-40px, -50px) scale(1.05); } }
    @keyframes drift3 { to { transform: translate(-40%, -60%) scale(1.2); } }

    /* ── Grid ── */
    .grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }

    /* ── Lang toggle ── */
    .lang-toggle {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 100;
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.5s 1s forwards;
    }
    .lang-btn {
      padding: 7px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .lang-btn.active {
      background: var(--blue-dim);
      color: var(--blue);
    }
    .lang-btn:hover:not(.active) { color: var(--text); }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 24px;
      max-width: 700px;
      width: 100%;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
      border: 1px solid var(--blue-border);
      background: var(--blue-dim);
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }
    .eyebrow-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(3.2rem, 10vw, 6rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.7s 0.35s forwards;
    }
    h1 .first { color: var(--text); display: block; }
    h1 .last {
      color: #2a3a5e;
      display: block;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted2);
      margin-top: 22px;
      margin-bottom: 52px;
      line-height: 1.75;
      opacity: 0;
      animation: fadeUp 0.7s 0.55s forwards;
    }
    .subtitle strong { color: rgba(234,236,244,0.7); font-weight: 500; }

    /* ── Tech icons strip ── */
    .tech-strip {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.7s 0.7s forwards;
    }
    .tech-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted2);
      transition: all 0.2s;
    }
    .tech-badge:hover {
      border-color: var(--blue-border);
      color: var(--text);
      background: var(--blue-dim);
    }
    .tech-badge svg { flex-shrink: 0; }

    /* ── CTA ── */
    .cta-wrap {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.7s 0.85s forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 34px;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13.5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 10px;
      transition: all 0.25s;
      box-shadow: 0 0 48px rgba(79,142,247,0.30), 0 2px 12px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 56px rgba(79,142,247,0.50), 0 4px 20px rgba(0,0,0,0.4); }
    .btn-primary:hover::after { opacity: 1; }
    .btn-primary .arrow { transition: transform 0.25s; }
    .btn-primary:hover .arrow { transform: translateX(4px); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 28px;
      background: transparent;
      color: var(--muted2);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 13.5px;
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.25s;
    }
    .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.1em;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s 1.2s forwards;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 0.45; }
    }

    @media (max-width: 500px) {
      .tech-strip { gap: 7px; }
      .tech-badge { font-size: 11px; padding: 4px 10px; }
    }
  </style>
</head>
<body>

  <div class="footer">Recife · PE · 2025 — 2026</div>

  <script>
    function setLang(lang) {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
      document.querySelectorAll('[data-pt]').forEach(el => {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
      document.documentElement.setAttribute('lang', lang === 'pt' ? 'pt-br' : 'en');
    }
  </script>
</body>
